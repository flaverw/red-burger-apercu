<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Red Burger × Everywhere — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#E11D2E;--ink:#161314;--gold:#F2A93B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;min-height:100vh;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px}
.hub{width:100%;max-width:420px;text-align:center}
.ev{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.mk{width:56px;height:56px;background:var(--red);color:#fff;display:grid;place-items:center;font-family:'Anton';font-size:22px;border-radius:12px;margin:0 auto 12px;transform:rotate(-4deg)}
h1{font-family:'Anton';font-size:28px;text-transform:uppercase}
.tag{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#cfc6bd;margin:4px 0 24px}
a.b{display:flex;align-items:center;gap:14px;text-align:left;background:#211d1e;border:1px solid #333;border-radius:16px;padding:16px 18px;margin-bottom:12px;color:#fff;text-decoration:none}
a.b:active{transform:scale(.98)}
a.b .ic{font-size:22px;width:28px;text-align:center}
a.b .t{flex:1}
a.b .t .h{font-family:'Anton';font-size:16px;display:block}
a.b .t .s{font-size:12px;color:#cfc6bd;display:block;margin-top:2px}
a.b .ar{font-size:20px;color:var(--gold)}
a.b.prim{background:var(--red);border-color:var(--red)}
a.b.prim .t .s{color:#ffd6d6}a.b.prim .ar{color:#fff}
a.etude{display:flex;align-items:center;gap:14px;text-align:left;text-decoration:none;color:#fff;margin-top:6px;background:#2c6e49;border:1px solid #3d8a5f;border-radius:16px;padding:16px 18px}
a.etude .ic{font-size:24px;width:28px;text-align:center}
a.etude .t{flex:1}
a.etude .t .l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:#c9e6b8;display:block}
a.etude .t .h{font-family:'Anton';font-size:16px;display:block;margin-top:2px}
a.etude .t .s{font-size:12px;color:#dcefd0;display:block;margin-top:2px}
a.etude .ar{font-size:20px;color:#c9e6b8}
.foot{margin-top:18px;font-size:11px;color:#cfc6bd}
</style>
</head>
<body>
<div class="hub">
  <div class="ev">Everywhere · Hub commercial</div>
  <div class="mk">RB</div>
  <h1>Red Burger</h1>
  <div class="tag">Tout pour l'échange, en un écran</div>

  <a class="b prim" href="../" target="_blank" rel="noopener">
    <span class="ic">🍔</span><span class="t"><span class="h">Voir la maquette</span><span class="s">Votre marque, votre carte, vos avis</span></span><span class="ar">→</span>
  </a>
  <a class="etude" href="../etude/?e=Red%20Burger">
    <span class="ic">🧮</span><span class="t"><span class="l">En bonus · sous 48 h</span><span class="h">L'étude d'économies</span><span class="s">Ses contrats passés au crible</span></span><span class="ar">→</span>
  </a>
  <div class="foot">Everywhere · Cabinet d'accompagnement numérique</div>
</div>
</body>
</html>
